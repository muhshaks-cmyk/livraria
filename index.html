<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(135deg,#0b1622 0%,#0f1e2e 100%);min-height:100vh;color:#fff;font-family:Georgia,serif}
input,button,a,label{font-family:sans-serif}
input[type=date]{color-scheme:dark}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#1a2d40;border-radius:2px}
#loader{position:fixed;inset:0;background:#0b1622;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;gap:14px}
#loader-title{color:#c9a84c;font-size:18px;letter-spacing:4px;font-family:Georgia,serif}
#loader-msg{color:#3a5570;font-size:13px;line-height:1.7;max-width:320px}
#loader-err{display:none;background:#1a0f0f;border:1px solid #5a2020;border-radius:16px;padding:20px 24px;max-width:400px;color:#e88c6a;font-size:13px;line-height:1.8}
#loader-err strong{color:#ffaaaa;display:block;font-size:15px;margin-bottom:8px}
.btn-retry{margin-top:16px;background:#c9a84c;color:#0b1622;font-weight:700;border:none;border-radius:12px;padding:11px 28px;cursor:pointer;font-size:14px}
#app{display:none}
#header{position:sticky;top:0;z-index:40;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;background:rgba(11,22,34,.93);backdrop-filter:blur(12px);border-bottom:1px solid #1a2d40}
#header .left{display:flex;align-items:center;gap:10px}
.brand{color:#c9a84c;font-weight:700;font-size:15px;letter-spacing:2px}
.hd-sub{color:#3a5570;font-size:13px}
.btn-back{background:none;border:none;color:#c9a84c;font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
.btn-icon{background:none;border:none;color:#3a5570;font-size:20px;cursor:pointer}
#main{max-width:520px;margin:0 auto;padding:26px 14px}
.box{background:#0f1e2e;border:1px solid #1a2d40;border-radius:18px;padding:18px}
.btn-gold{background:#c9a84c;color:#0b1622;font-weight:700;border:none;border-radius:12px;padding:13px 0;cursor:pointer;width:100%;font-size:15px}
.btn-ghost{background:#1a2d40;color:#3a5570;border:none;border-radius:12px;padding:13px 16px;cursor:pointer;font-size:14px}
.btn-danger{background:#7a1a1a;color:#ffaaaa;font-weight:700;border:none;border-radius:12px;padding:12px;cursor:pointer;font-size:14px;flex:1}
.inp{background:#0b1622;border:1px solid #1a2d40;color:#fff;width:100%;padding:12px 16px;border-radius:12px;font-size:14px;outline:none}
.inp:focus{border-color:#c9a84c}
.lbl{color:#3a5570;font-size:11px;letter-spacing:2px;display:block;margin-bottom:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat-mini{background:#0b1622;border-radius:12px;padding:12px}
.pbar-wrap{height:4px;background:#1a2d40;border-radius:2px;overflow:hidden}
.pbar{height:100%;border-radius:2px;transition:width .3s}
.stamp{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.stamp.on{background:#c9a84c;color:#0b1622}
.stamp.off{border:1.5px solid #1a3050;color:transparent}
.cfg-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #1a2d40}
.cfg-row:last-child{border-bottom:none}
.badge-exp{font-size:10px;background:#3a1a00;color:#e88c6a;padding:2px 6px;border-radius:8px}
.badge-v{background:#c9a84c;color:#0b1622;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap}
.p-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.p-desc{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-meta{color:#3a5570;font-size:12px;margin-top:2px}
.p-val{color:#c9a84c;font-weight:700;font-size:14px;white-space:nowrap}
.p-actions{display:flex;gap:5px;flex-shrink:0}
.btn-edit{background:#1e3247;border:none;color:#5a8aaa;border-radius:8px;padding:5px 8px;cursor:pointer;font-size:13px}
.btn-del-p{background:#1f1010;border:none;color:#804040;border-radius:8px;padding:5px 8px;cursor:pointer;font-size:13px}
.v-item{background:#0d1f12;border:1px solid #1a3a1a;border-radius:14px;padding:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.empty{text-align:center;padding:60px 0;color:#1a3050}
.empty-icon{font-size:52px;margin-bottom:14px}
.xl-link{margin-top:10px;padding:14px;background:#0d2010;border:1px solid #1a4020;border-radius:12px;text-align:center;display:none}
.xl-link a{color:#7ec8a0;font-weight:700;font-size:15px;text-decoration:none}
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#7ec8a0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#toast{position:fixed;top:16px;right:16px;z-index:9999;max-width:340px;padding:12px 20px;border-radius:14px;font-size:13px;font-weight:700;line-height:1.5;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:50;display:none;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#0f1e2e;border:1px solid #1a2d40;border-radius:20px;padding:24px;width:100%;max-width:440px}
.modal-title{font-weight:700;font-size:20px;margin-bottom:20px}
.form-col{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.form-row{display:flex;gap:12px}
#card-overlay{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column;align-items:center;padding:24px 12px 40px;overflow-y:auto}
#html-card{width:100%;max-width:480px;background:linear-gradient(135deg,#0b1622 0%,#152233 100%);border-radius:18px;overflow:hidden;position:relative;border:1px solid rgba(201,168,76,.15);box-shadow:0 0 60px rgba(201,168,76,.12)}
#html-card .gold-bar{position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(180deg,#e8c96a,#a87828)}
#html-card .deco{position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;background:rgba(201,168,76,.06);pointer-events:none}
#html-card .inner{padding:22px 22px 20px 28px}
</style>
</head>
<body>

<div id="loader">
  <div id="loader-title">A CARREGAR…</div>
  <div id="loader-msg">A ligar ao Firebase…</div>
  <div id="loader-err">
    <strong id="err-title">Erro</strong>
    <span id="err-body"></span>
    <button class="btn-retry" onclick="location.reload()">↺ Tentar novamente</button>
  </div>
</div>

<div id="app">
  <div id="header">
    <div class="left">
      <button class="btn-back" id="btn-back" onclick="goBack()" style="display:none">←</button>
      <span class="brand" id="brand-name">LIVRARIA</span>

</div>

<div id="card-overlay">
  <canvas id="card-canvas" style="display:none"></canvas>
  <div id="card-dl-wrap" style="margin-bottom:12px;display:none">
    <a id="card-dl-link" style="display:inline-block;padding:11px 28px;background:#c9a84c;color:#0b1622;border-radius:12px;font-weight:700;font-size:14px;text-decoration:none">⬇️ Descarregar imagem (computador)</a>
  </div>
  <div style="font-size:13px;color:#5a7a99;margin-bottom:14px;text-align:center;line-height:1.8">
    📸 <strong style="color:#8aaabb">Telemóvel:</strong> screenshot ao cartão abaixo
  </div>
  <div id="html-card"></div>
  <button onclick="closeCard()" style="margin-top:20px;background:none;border:1px solid #1a2d40;color:#3a5570;padding:10px 32px;border-radius:10px;cursor:pointer;font-size:14px">Fechar</button>
</div>

<div class="overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>
<div id="toast"></div>

<!-- LOGIN OVERLAY -->
<div id="login-overlay" style="position:fixed;inset:0;background:#0b1622;z-index:500;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="width:100%;max-width:380px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="color:#c9a84c;font-size:22px;font-weight:700;letter-spacing:3px;font-family:Georgia,serif" id="login-brand">LIVRARIA</div>
      <div style="color:#3a5570;font-size:13px;margin-top:6px">Programa de Fidelização</div>
    </div>
    <div style="background:#0f1e2e;border:1px solid #1a2d40;border-radius:20px;padding:28px">
      <div style="color:#3a5570;font-size:11px;letter-spacing:3px;margin-bottom:20px;text-align:center">INICIAR SESSÃO</div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:20px">
        <input class="inp" type="email" id="l_email" placeholder="Email" autocomplete="email">
        <input class="inp" type="password" id="l_pass" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div id="login-err" style="display:none;color:#e88c6a;font-size:13px;margin-bottom:14px;text-align:center;background:#1a0f0f;padding:10px;border-radius:10px"></div>
      <button class="btn-gold" onclick="doLogin()" id="login-btn">Entrar</button>
    </div>
  </div>
</div>

<!-- USERS MODAL -->
<div class="overlay" id="users-overlay" onclick="if(event.target===this)$('users-overlay').style.display='none'">
  <div style="background:#0f1e2e;border:1px solid #1a2d40;border-radius:20px;padding:24px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div style="font-weight:700;font-size:18px;font-family:Georgia,serif">Gestão de Utilizadores</div>
      <button onclick="showAddUser()" style="background:#c9a84c;color:#0b1622;border:none;border-radius:10px;padding:8px 14px;cursor:pointer;font-weight:700;font-size:13px">+ Novo</button>
    </div>
    <div id="users-list"></div>
    <button onclick="$('users-overlay').style.display='none'" style="margin-top:16px;background:#1a2d40;color:#3a5570;border:none;border-radius:12px;padding:12px;width:100%;cursor:pointer">Fechar</button>
  </div>
</div>

<!-- USER FORM MODAL -->
<div class="overlay" id="user-form-overlay" onclick="if(event.target===this)$('user-form-overlay').style.display='none'">
  <div style="background:#0f1e2e;border:1px solid #1a2d40;border-radius:20px;padding:24px;width:100%;max-width:440px">
    <div class="modal-title" id="user-form-title">Novo Utilizador</div>
    <div class="form-col" id="user-form-fields"></div>
    <div style="color:#e88c6a;font-size:13px;margin-bottom:14px;display:none" id="user-form-err"></div>
    <div class="form-row">
      <button class="btn-gold" style="flex:1" onclick="doSaveUser()">Guardar</button>
      <button class="btn-ghost" onclick="$('user-form-overlay').style.display='none'">Cancelar</button>
    </div>
  </div>
</div>


<script>
// ════════════════════════════════════════════════════════════════
//  PREENCHA COM OS DADOS DO SEU PROJECTO FIREBASE
// ════════════════════════════════════════════════════════════════
var FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDPUZcNuBs6pEMnXVY0h0Dfvdb8YchRRXE",
  authDomain:        "fidel-bz.firebaseapp.com",
  projectId:         "fidel-bz",
  storageBucket:     "fidel-bz.firebasestorage.app",
  messagingSenderId: "1079445798299",
  appId:             "1:1079445798299:web:60e970275793a72614753e",
};
// ════════════════════════════════════════════════════════════════

// ── utils ──────────────────────────────────────────────────────
var uid      = function(){ return Math.random().toString(36).substr(2,9); };
var vCode    = function(){ return "VCH-"+Math.random().toString(36).substr(2,6).toUpperCase(); };
var fmtMT    = function(n){ return Number(n).toLocaleString("pt")+" MT"; };
var fmtDate  = function(iso){ return new Date(iso).toLocaleDateString("pt",{day:"2-digit",month:"short",year:"numeric"}); };
var todayISO = function(){ return new Date().toISOString().split("T")[0]; };
var padNum   = function(n){ return String(n||0).padStart(2,"0"); };
var toISO    = function(d){ return new Date(d+"T12:00:00").toISOString(); };
var $        = function(id){ return document.getElementById(id); };

function showError(title, body) {
  $("loader-title").style.display="none";
  $("loader-msg").style.display="none";
  $("loader-err").style.display="block";
  $("err-title").textContent=title;
  $("err-body").innerHTML=body;
}

function checkCycle(cp, adhesionDate, cfg) {
  var total=cp.reduce(function(s,p){return s+p.value;},0);
  if(total<cfg.minValue) return {ok:false,reason:"valor do ciclo ("+fmtMT(total)+") inferior ao mínimo de "+fmtMT(cfg.minValue)};
  if(adhesionDate){
    var dl=new Date(adhesionDate); dl.setFullYear(dl.getFullYear()+1);
    if(new Date(cp[cp.length-1].date)>dl) return {ok:false,reason:"prazo de 1 ano excedido (limite: "+fmtDate(dl.toISOString())+")"};
  }
  return {ok:true};
}

// ── state ──────────────────────────────────────────────────────
var DEF={bookstoreName:"Livraria",purchasesNeeded:15,minValue:22000,voucherValue:500,nextClientNumber:1};
var cfg={}, customers={}, page="home", activeId=null, search="", editP=null, xlsUrl=null;

// ── firebase ───────────────────────────────────────────────────
var db, settingsRef, customersCol;

function startApp() {
  if(FIREBASE_CONFIG.apiKey==="COLE_AQUI"){
    showError("Firebase não configurado","Abra o ficheiro HTML e preencha os campos do <strong>FIREBASE_CONFIG</strong> com os dados do seu projecto Firebase.");
    return;
  }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    settingsRef  = db.collection("livraria").doc("settings");
    customersCol = db.collection("livraria_customers");
  } catch(e){
    showError("Erro ao iniciar Firebase", e.message);
    return;
  }
  // init firebase data then check login
  initFirebaseData();
}

function initFirebaseData() {
  $("loader-msg").textContent = "A ligar ao Firebase…";
  var timeout = setTimeout(function(){
    showError("Tempo esgotado","Não foi possível ligar ao Firebase em 10 segundos.<br><br>Verifique o FIREBASE_CONFIG e as regras do Firestore.");
  }, 10000);

  settingsRef.get().then(function(snap){
    clearTimeout(timeout);
    if(snap.exists){ cfg = Object.assign({}, DEF, snap.data()); }
    else { cfg = Object.assign({}, DEF); settingsRef.set(cfg); }

    // update login brand name
    $("login-brand").textContent = cfg.bookstoreName.toUpperCase();

    // init default admin if needed
    return initDefaultAdmin();
  }).then(function(){
    // real-time listener
    customersCol.onSnapshot(function(snapshot){
      customers = {};
      snapshot.forEach(function(d){ customers[d.id] = d.data(); });
      $("sync-dot-wrap").innerHTML = "<span class='sync-dot' title='Sincronizado'></span>";
      if(currentUser) render();
    }, function(err){
      notify("Erro de sincronização: " + err.message, "warn");
    });

    $("loader").style.display = "none";

    // check existing session
    var session = getSession();
    if(session) {
      // verify session still valid in firebase
      db.collection("livraria_users").where("email","==",session.email).get().then(function(snap){
        if(!snap.empty) {
          var userData = snap.docs[0].data();
          currentUser = Object.assign({}, userData, {id: snap.docs[0].id});
          saveSession(currentUser);
          showApp();
        } else {
          clearSession();
          $("login-overlay").style.display = "flex";
        }
      }).catch(function(){ $("login-overlay").style.display = "flex"; });
    } else {
      $("login-overlay").style.display = "flex";
    }

  }).catch(function(e){
    clearTimeout(timeout);
    var isRules = e.message.indexOf("permission") > -1 || e.message.indexOf("PERMISSION_DENIED") > -1;
    showError(
      isRules ? "Acesso negado pelo Firestore" : "Erro ao ligar ao Firebase",
      isRules ? "As <strong>Regras</strong> do Firestore estão a bloquear o acesso.<br><br>Vá ao Firebase → Firestore → <strong>Rules</strong> e publique as regras abertas." : e.message
    );
  });
}

// init() replaced by initFirebaseData()

// ── Firestore helpers ──────────────────────────────────────────
function saveCfg(c){ cfg=c; return settingsRef.set(c); }
function saveCustomer(id,data){ return db.collection("livraria_customers").doc(id).set(data); }
function removeCustomer(id){ return db.collection("livraria_customers").doc(id).delete(); }

// ── actions ────────────────────────────────────────────────────
function createCustomer(name,phone,ad){
  var id=uid(), num=cfg.nextClientNumber||1;
  saveCustomer(id,{id:id,clientNumber:num,name:name,phone:phone||"",adhesionDate:ad||todayISO(),purchases:[],vouchers:[],failedCycles:0,createdAt:new Date().toISOString()});
  saveCfg(Object.assign({},cfg,{nextClientNumber:num+1}));
  notify("Cliente nº "+padNum(num)+" \""+name+"\" criado."); closeModal();
}

function deleteCustomer(id){
  removeCustomer(id); closeModal(); nav("list"); notify("Cliente removido.");
}

function addPurchase(value,desc,date){
  var c=customers[activeId];
  var purchases=c.purchases.concat([{id:uid(),value:+value,desc:desc||"—",date:toISO(date)}]);
  var needed=cfg.purchasesNeeded;
  var prevCy=Math.floor(c.purchases.length/needed), newCy=Math.floor(purchases.length/needed);
  var vouchers=c.vouchers.slice(), fail=c.failedCycles||0, newV=null;
  if(newCy>prevCy){
    var cp=purchases.slice(prevCy*needed,prevCy*needed+needed);
    var res=checkCycle(cp,c.adhesionDate,cfg);
    if(res.ok){ newV={id:uid(),code:vCode(),value:cfg.voucherValue,date:new Date().toISOString(),used:false}; vouchers.push(newV); }
    else{ fail++; setTimeout(function(){notify("Ciclo completo — sem voucher: "+res.reason+".","warn");},300); }
  }
  saveCustomer(activeId,Object.assign({},c,{purchases:purchases,vouchers:vouchers,failedCycles:fail}));
  closeModal();
  if(newV) notify("🎉 Voucher de "+fmtMT(cfg.voucherValue)+" desbloqueado!","voucher");
  else if(newCy===prevCy) notify("Compra registada.");
}

function editPurchaseAction(pId,value,desc,date){
  var c=customers[activeId];
  var purchases=c.purchases.map(function(p){ return p.id===pId?Object.assign({},p,{value:+value,desc:desc||"—",date:toISO(date)}):p; });
  saveCustomer(activeId,Object.assign({},c,{purchases:purchases}));
  closeModal(); notify("Compra actualizada.");
}

function delPurchaseAction(pId){
  var c=customers[activeId];
  saveCustomer(activeId,Object.assign({},c,{purchases:c.purchases.filter(function(p){return p.id!==pId;})}));
  closeModal(); notify("Compra removida.");
}

function markUsedAction(vId){
  var c=customers[activeId];
  var vouchers=c.vouchers.map(function(v){ return v.id===vId?Object.assign({},v,{used:true,usedAt:new Date().toISOString()}):v; });
  saveCustomer(activeId,Object.assign({},c,{vouchers:vouchers}));
  notify("Voucher marcado como usado.");
}

// ── nav ────────────────────────────────────────────────────────
function nav(p,id){ page=p; if(id)activeId=id; search=""; render(); }
function goBack(){ if(page==="settings"||page==="list")nav("home"); else if(page==="detail")nav("list"); }

// ── toast ──────────────────────────────────────────────────────
var toastT;
function notify(msg,kind){
  kind=kind||"ok";
  var t=$("toast"); t.textContent=msg; t.style.display="block";
  t.style.background=kind==="voucher"?"#c9a84c":kind==="warn"?"#2a1f0a":"#12253a";
  t.style.color=kind==="voucher"?"#0b1622":kind==="warn"?"#e8a020":"#fff";
  t.style.border=kind==="voucher"?"none":kind==="warn"?"1px solid #5a3a00":"1px solid #1a3050";
  clearTimeout(toastT); toastT=setTimeout(function(){t.style.display="none";},5000);
}

// ── modal ──────────────────────────────────────────────────────
function closeModal(){ $("modal-overlay").style.display="none"; editP=null; }
function showModal(html){ $("modal-box").innerHTML=html; $("modal-overlay").style.display="flex"; }

// ── card ───────────────────────────────────────────────────────
function openCard(){
  var c=customers[activeId]; if(!c)return;
  var needed=cfg.purchasesNeeded, total=c.purchases.length;
  var spent=c.purchases.reduce(function(s,p){return s+p.value;},0), prog=total%needed;
  var dlStr="";
  if(c.adhesionDate){var dl=new Date(c.adhesionDate);dl.setFullYear(dl.getFullYear()+1);dlStr=fmtDate(dl.toISOString());}

  var stamps="";

// ── Excel ──────────────────────────────────────────────────────
function exportExcel(){
  if(!window.XLSX){notify("Biblioteca Excel não carregou. Recarregue a página.","warn");return;}
  var rows=[];
  Object.values(customers).sort(function(a,b){return (a.clientNumber||0)-(b.clientNumber||0);}).forEach(function(c){
    if(!c.purchases.length){
      rows.push({"Nº":padNum(c.clientNumber),"Nome":c.name,"Telefone":c.phone||"—","Data Adesão":c.adhesionDate?fmtDate(c.adhesionDate+"T00:00:00"):"—","Nº Compra":"—","Data Compra":"—","Descrição":"—","Valor (MT)":0,"Ciclo":"—","Vouchers":c.vouchers.length});
    } else {
      c.purchases.forEach(function(p,i){rows.push({"Nº":padNum(c.clientNumber),"Nome":c.name,"Telefone":c.phone||"—","Data Adesão":c.adhesionDate?fmtDate(c.adhesionDate+"T00:00:00"):"—","Nº Compra":i+1,"Data Compra":fmtDate(p.date),"Descrição":p.desc,"Valor (MT)":p.value,"Ciclo":Math.floor(i/cfg.purchasesNeeded)+1,"Vouchers":i===0?c.vouchers.length:""});});
    }
  });
  if(!rows.length){notify("Sem dados.","warn");return;}
  var ws=XLSX.utils.json_to_sheet(rows); ws["!cols"]=[8,24,16,14,10,14,30,12,8,10].map(function(w){return{wch:w};});
  var wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Vendas");
  var ws2=XLSX.utils.json_to_sheet(Object.values(customers).sort(function(a,b){return (a.clientNumber||0)-(b.clientNumber||0);}).map(function(c){return{"Nº":padNum(c.clientNumber),"Nome":c.name,"Telefone":c.phone||"—","Data Adesão":c.adhesionDate?fmtDate(c.adhesionDate+"T00:00:00"):"—","Total Compras":c.purchases.length,"Total Gasto (MT)":c.purchases.reduce(function(s,p){return s+p.value;},0),"Vouchers":c.vouchers.length,"Usados":c.vouchers.filter(function(v){return v.used;}).length};}));
  ws2["!cols"]=[8,24,16,14,14,18,10,8].map(function(w){return{wch:w};});
  XLSX.utils.book_append_sheet(wb,ws2,"Resumo");
  var buf=XLSX.write(wb,{type:"array",bookType:"xlsx"});
  var blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  if(xlsUrl)URL.revokeObjectURL(xlsUrl);
  xlsUrl=URL.createObjectURL(blob);
  $("xl-link-wrap").style.display="block"; $("xl-a").href=xlsUrl;
}

          usedV.map(function(v){return '<div style="display:flex;justify-content:space-between;padding:6px 12px;color:#253545;font-size:12px"><span>'+v.code+'</span><span>'+fmtMT(v.value)+' · '+fmtDate(v.usedAt)+'</span></div>';}).join("")+
        '</div>':"")+
      '<button onclick="showConfirmDelete()" style="background:#1a0f0f;border:1px solid #3a1a1a;color:#804040;width:100%;padding:12px;border-radius:12px;cursor:pointer;font-size:14px">Remover cliente</button>';
  }
  else if(page==="settings"){
    var isAdmin = currentUser && currentUser.role === "admin";
    m.innerHTML=
      '<h2 style="font-size:24px;font-weight:700;margin-bottom:28px">Definições</h2>'+
      '<div style="display:flex;flex-direction:column;gap:18px">'+
        [["NOME DA LIVRARIA","bookstoreName","text"],["COMPRAS POR CICLO","purchasesNeeded","number"],["VALOR MÍNIMO POR CICLO (MT)","minValue","number"],["VALOR DO VOUCHER (MT)","voucherValue","number"]].map(function(f){
          return '<div><label class="lbl">'+f[0]+'</label><input class="inp" type="'+f[2]+'" '+(f[2]==="number"?"min=1":"")+' id="cfg_'+f[1]+'" value="'+cfg[f[1]]+'"></div>';
        }).join("")+
        '<p style="color:#253545;font-size:12px;line-height:1.5">O prazo de 1 ano a contar da adesão é aplicado automaticamente.</p>'+
        '<button class="btn-gold" onclick="saveSettings()">Guardar</button>'+
        (isAdmin ?
          '<div style="height:1px;background:#1a2d40;margin:8px 0"></div>'+
          '<button class="btn-gold" style="background:#1a2d40;color:#8aaabb;font-size:14px" onclick="openUsersModal()">👥 Gerir Utilizadores</button>'
        : "") +
        '<button class="btn-gold" style="background:#1a0f0f;color:#804040;font-size:14px;margin-top:4px" onclick="logout()">⏻ Terminar Sessão</button>'+
      '</div>';
  }
}

// ── settings ───────────────────────────────────────────────────
function saveSettings(){
  saveCfg(Object.assign({},cfg,{
    bookstoreName:   $("cfg_bookstoreName").value||cfg.bookstoreName,
    purchasesNeeded: +$("cfg_purchasesNeeded").value||cfg.purchasesNeeded,
    minValue:        +$("cfg_minValue").value||cfg.minValue,
    voucherValue:    +$("cfg_voucherValue").value||cfg.voucherValue,
  }));
  notify("Definições guardadas.");
}

// ── modals ─────────────────────────────────────────────────────
function showAddCustomer(){showModal(
  '<div class="modal-title">Novo Cliente</div>'+
  '<div class="form-col">'+
    '<input class="inp" id="m_name" placeholder="Nome completo *">'+
    '<input class="inp" id="m_phone" placeholder="Telefone (opcional)">'+
    '<div><label class="lbl">DATA DE ADESÃO</label><input class="inp" type="date" id="m_ad" value="'+todayISO()+'"></div>'+
  '</div>'+
  '<div class="form-row"><button class="btn-gold" style="flex:1" onclick="doCreate()">Criar</button><button class="btn-ghost" onclick="closeModal()">Cancelar</button></div>'
);}
function doCreate(){var n=$("m_name").value.trim();if(n)createCustomer(n,$("m_phone").value,$("m_ad").value);}

function showAddPurchase(){showModal(
  '<div class="modal-title">Registar Compra</div>'+
  '<div class="form-col">'+
    '<div style="position:relative"><input class="inp" type="number" min="0" id="m_val" placeholder="Valor *" style="padding-right:48px"><span style="position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#3a5570">MT</span></div>'+
    '<input class="inp" id="m_desc" placeholder="Descrição (ex: Atomic Habits)">'+
    '<div><label class="lbl">DATA DA COMPRA</label><input class="inp" type="date" id="m_date" value="'+todayISO()+'"></div>'+
  '</div>'+
  '<div class="form-row"><button class="btn-gold" style="flex:1" onclick="doAdd()">Registar</button><button class="btn-ghost" onclick="closeModal()">Cancelar</button></div>'
);}
function doAdd(){var v=$("m_val").value;if(v&&+v>0)addPurchase(v,$("m_desc").value,$("m_date").value);}

function showEditPurchase(pId,value,desc,date){
  editP={id:pId};
  showModal(
    '<div class="modal-title">Editar Compra</div>'+
    '<div class="form-col">'+
      '<div style="position:relative"><input class="inp" type="number" min="0" id="m_val" value="'+value+'" style="padding-right:48px"><span style="position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#3a5570">MT</span></div>'+
      '<input class="inp" id="m_desc" value="'+desc+'">'+
      '<div><label class="lbl">DATA DA COMPRA</label><input class="inp" type="date" id="m_date" value="'+date+'"></div>'+
    '</div>'+
    '<div class="form-row"><button class="btn-gold" style="flex:1" onclick="doEdit()">Guardar</button><button class="btn-ghost" onclick="closeModal()">Cancelar</button></div>'
  );
}
function doEdit(){var v=$("m_val").value;if(v&&+v>0)editPurchaseAction(editP.id,v,$("m_desc").value,$("m_date").value);}

function showDelPurchase(pId,value,desc,date){
  editP={id:pId};
  showModal(
    '<div class="modal-title" style="font-size:18px">Remover compra?</div>'+
    '<p style="color:#8aaabb;font-size:14px;margin-bottom:6px;line-height:1.5"><strong style="color:#fff">'+desc+'</strong><br><span style="color:#c9a84c">'+fmtMT(value)+'</span> · '+fmtDate(date+"T00:00:00")+'</p>'+
    '<p style="color:#5a3a3a;font-size:12px;margin-bottom:20px">Vouchers já ganhos não são afectados.</p>'+
    '<div class="form-row"><button class="btn-danger" onclick="delPurchaseAction(\''+pId+'\')">Sim, remover</button><button class="btn-ghost" onclick="closeModal()">Cancelar</button></div>'
  );
}

function showConfirmDelete(){
  var c=customers[activeId];if(!c)return;
  showModal(
    '<div class="modal-title" style="font-size:18px">Remover cliente?</div>'+
    '<p style="color:#8aaabb;font-size:14px;margin-bottom:24px;line-height:1.6">Vai remover <strong style="color:#fff">'+c.name+'</strong> e todo o historial. Esta acção não pode ser desfeita.</p>'+
    '<div class="form-row"><button class="btn-danger" onclick="deleteCustomer(\''+activeId+'\')">Sim, remover</button><button class="btn-ghost" onclick="closeModal()">Cancelar</button></div>'
  );
}

// ── start ──────────────────────────────────────────────────────
window.addEventListener("load", startApp);
</script>
</body>
</html>
